name: messagerie
description: "Application de messagerie instantanée avec Supabase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.5.6

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.1
  file_picker: ^8.1.2
  cached_network_image: ^3.3.1

  # UI
  timeago: ^3.6.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # Utils
  uuid: ^4.4.0
  path: ^1.9.0
  mime: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
